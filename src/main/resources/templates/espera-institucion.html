<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro en Revision | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary:#059669; --primary-dark:#047857; --accent:#d97706; --text:#1f2937; --text-muted:#6b7280; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; background:#f8fafc; }
        .card { background:#fff; border:1px solid #e5e7eb; border-radius:24px; padding:3rem 2.5rem; max-width:520px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.06); animation:fadeIn 0.6s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
        .icon-circle { width:90px;height:90px;border-radius:50%;background:rgba(5,150,105,0.08);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.2rem; }
        .icon-circle i { font-size:2.5rem;color:var(--primary); }
        .card h2 { font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:0.8rem; }
        .card p { color:var(--text-muted);font-size:0.92rem;line-height:1.7;margin-bottom:1.8rem; }
        .btn-back { display:inline-flex;align-items:center;gap:0.4rem;padding:0.7rem 1.8rem;border-radius:50px;background:linear-gradient(135deg,#059669,#047857);color:white;font-weight:600;text-decoration:none;transition:all 0.3s; }
        .btn-back:hover { transform:translateY(-2px);box-shadow:0 8px 25px rgba(5,150,105,0.3);color:white; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-circle">
        <i class="fas fa-building"></i>
    </div>
    <h2>Registro recibido con exito!</h2>
    <p>
        Tu solicitud esta en proceso de revision por el Administrador Global.
        Verificaremos el NIT y el enfoque de tu institucion.
        Por favor, espera a que tu cuenta sea aprobada para acceder al sistema.
    </p>
    <a th:href="@{/login}" class="btn-back">
        <i class="fas fa-arrow-left"></i> Volver al inicio de sesion
    </a>
</div>

</body>
</html>
