<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${titulo}">Curso | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary:#059669; --text:#1f2937; --text-muted:#6b7280; --bg:#f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .article-container { max-width:780px; margin:0 auto; padding:2rem 1.5rem 4rem; }
        .btn-back { display:inline-flex; align-items:center; gap:0.3rem; padding:0.55rem 1.3rem; border-radius:50px; border:1.5px solid #e5e7eb; color:var(--text-muted); font-weight:500; font-size:0.85rem; text-decoration:none; transition:all 0.25s; margin-bottom:1.5rem; }
        .btn-back:hover { color:var(--primary); border-color:var(--primary); }
        .article-card { background:#fff; border:1px solid #e5e7eb; border-radius:18px; padding:2.5rem 2rem; box-shadow:0 4px 20px rgba(0,0,0,0.03); }
        .article-card h1 { font-size:1.6rem; font-weight:700; color:var(--text); margin-bottom:0.5rem; }
        .article-card .badge-curso { display:inline-block; padding:0.25rem 0.8rem; border-radius:50px; font-size:0.72rem; font-weight:600; background:rgba(5,150,105,0.07); color:var(--primary); margin-bottom:1.2rem; }
        .article-card .content { font-size:0.9rem; color:var(--text-muted); line-height:1.8; white-space:pre-line; }
    </style>
</head>
<body>

<div class="article-container">
    <a th:href="@{/convocatorias/disponibles}" class="btn-back">
        <i class="fas fa-arrow-left"></i> Volver al catalogo
    </a>

    <div class="article-card">
        <h1 th:text="${titulo}">Titulo del Curso</h1>
        <span class="badge-curso">
            <i class="fas fa-graduation-cap me-1"></i> Educacion Continua - PortalEdu
        </span>
        <div class="content" th:text="${contenido}">
            Contenido del curso...
        </div>
    </div>
</div>

</body>
</html>
