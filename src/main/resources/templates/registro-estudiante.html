<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro Estudiante | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary:#059669; --primary-dark:#047857; --accent:#d97706; --danger:#dc2626; --text:#1f2937; --text-muted:#6b7280; --border:#e5e7eb; --white:#ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; background:#0a0f0d; position:relative; overflow-x:hidden; }
        .bg-animated { position:fixed; inset:0; z-index:0; background:linear-gradient(160deg,#064e3b 0%,#059669 25%,#0f172a 60%,#1a1a2e 100%); }
        .bg-animated::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 20% 80%,rgba(217,119,6,0.12) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(5,150,105,0.18) 0%,transparent 50%); animation:bgPulse 8s ease-in-out infinite; }
        @keyframes bgPulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }
        .orb { position:fixed; border-radius:50%; filter:blur(60px); z-index:0; animation:orbFloat 22s infinite ease-in-out; pointer-events:none; }
        .orb-1 { width:350px;height:350px;background:rgba(5,150,105,0.28);top:-120px;left:-100px; }
        .orb-2 { width:300px;height:300px;background:rgba(217,119,6,0.22);bottom:-100px;right:-80px;animation-delay:-8s; }
        .orb-3 { width:220px;height:220px;background:rgba(5,150,105,0.18);top:45%;left:55%;animation-delay:-15s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 25%{transform:translate(45px,-30px) scale(1.12);} 50%{transform:translate(-18px,40px) scale(0.88);} 75%{transform:translate(-40px,-18px) scale(1.06);} }

        .register-card { background:rgba(255,255,255,0.94); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:26px; padding:2.5rem 2.2rem; width:100%; max-width:470px; border:1px solid rgba(255,255,255,0.5); box-shadow:0 30px 70px rgba(0,0,0,0.2); position:relative; z-index:1; animation:cardIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
        @keyframes cardIn { from{opacity:0;transform:translateY(50px) scale(0.94);} to{opacity:1;transform:translateY(0) scale(1);} }
        .logo-container { text-align:center; margin-bottom:0.3rem; }
        .logo-container img { width:58px;height:58px;border-radius:14px;box-shadow:0 10px 30px rgba(5,150,105,0.25); animation:logoBounce 0.6s cubic-bezier(0.16,1,0.3,1) 0.18s both; }
        @keyframes logoBounce { 0%{transform:scale(0) rotate(-8deg);} 55%{transform:scale(1.12) rotate(2deg);} 100%{transform:scale(1) rotate(0deg);} }
        .card-title { font-size:1.55rem;font-weight:700;text-align:center;margin-bottom:0.2rem;color:var(--text); animation:fadeUp 0.5s ease 0.28s both; }
        .gradient-text { background:linear-gradient(135deg,#059669,#d97706); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .card-subtitle { display:block;text-align:center;color:#9ca3af;font-size:0.88rem;margin-bottom:1.6rem; animation:fadeUp 0.5s ease 0.38s both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:translateY(0);} }
        .alert-modern { background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:12px;padding:0.75rem 1rem;font-size:0.85rem;display:flex;align-items:center;gap:0.5rem;margin-bottom:1.2rem;animation:shake 0.5s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 15%{transform:translateX(-7px);} 35%{transform:translateX(7px);} 55%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
        .input-group-modern { position:relative; margin-bottom:0.9rem; animation:fadeUp 0.5s ease both; }
        .input-icon { position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:0.9rem;transition:color 0.3s;z-index:2;pointer-events:none; }
        .input-modern { width:100%;padding:0.85rem 1rem 0.85rem 2.8rem;border:2px solid var(--border);border-radius:14px;background:#f9fafb;font-size:0.9rem;font-family:'Poppins',sans-serif;color:var(--text);transition:all 0.3s;outline:none; }
        .input-modern:focus { border-color:var(--primary);background:var(--white);box-shadow:0 0 0 5px rgba(5,150,105,0.07); }
        .input-group-modern:focus-within .input-icon { color:var(--primary); }
        .input-modern::placeholder { color:#c4c4c4; }
        .password-toggle { position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;cursor:pointer;padding:0.3rem;transition:color 0.3s;z-index:2; }
        .password-toggle:hover { color:var(--primary); }
        .field-help { font-size:0.76rem;color:#9ca3af;margin-top:0.3rem;margin-left:0.2rem; }
        .btn-submit { width:100%;padding:0.9rem;border-radius:14px;background:linear-gradient(135deg,#059669,#047857);color:#fff;font-weight:600;font-size:1rem;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;margin:1.4rem 0 1rem;animation:fadeUp 0.5s ease 0.68s both; }
        .btn-submit:hover { transform:translateY(-2px);box-shadow:0 14px 40px rgba(5,150,105,0.4); }
        .btn-submit:active { transform:scale(0.95); }
        .btn-submit::after { content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.12),transparent);transform:translateX(-100%);transition:transform 0.65s; }
        .btn-submit:hover::after { transform:translateX(100%); }
        .form-footer { text-align:center;animation:fadeUp 0.5s ease 0.78s both; }
        .form-footer p { color:#9ca3af;font-size:0.88rem; }
        .form-footer a { color:var(--primary);font-weight:600;text-decoration:none;transition:color 0.3s; }
        .form-footer a:hover { color:var(--accent); }
        @media (max-width:576px) { .register-card { padding:1.8rem 1.2rem;border-radius:20px; } .card-title { font-size:1.4rem; } .input-modern { font-size:0.85rem;padding:0.8rem 1rem 0.8rem 2.6rem; } }
        .back-link { display:block;text-align:center;color:var(--text-muted);font-size:0.82rem;text-decoration:none;margin-top:0.5rem;animation:fadeUp 0.5s ease 0.88s both; }
        .back-link:hover { color:var(--primary); }
    </style>
</head>
<body>

<div class="bg-animated"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="register-card">
    <div class="logo-container">
        <img th:src="@{/img/logo.png}" alt="PortalEdu">
    </div>
    <h2 class="card-title">Registro <span class="gradient-text">Estudiante</span></h2>
    <span class="card-subtitle">Crea tu cuenta para postular a becas y convocatorias</span>

    <div th:if="${error}" class="alert-modern">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/registro/estudiante}" th:object="${usuario}" method="post">

        <div class="input-group-modern" style="animation-delay:0.42s">
            <i class="fas fa-user input-icon"></i>
            <input type="text" th:field="*{userName}" class="input-modern" placeholder="Nombre de usuario" required>
        </div>

        <div class="input-group-modern" style="animation-delay:0.50s">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" th:field="*{email}" class="input-modern" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="input-group-modern" style="animation-delay:0.58s">
            <i class="fas fa-phone input-icon"></i>
            <input type="tel" th:field="*{telefono}" class="input-modern" placeholder="Telefono de contacto"
                   pattern="\d+" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>

        <div class="input-group-modern" style="animation-delay:0.66s">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" th:field="*{password}" class="input-modern" id="passwordField" placeholder="Contrasena" minlength="6" required>
            <button type="button" class="password-toggle" onclick="togglePass(this)" tabindex="-1">
                <i class="fas fa-eye"></i>
            </button>
            <div class="field-help">Minimo 6 caracteres</div>
        </div>

        <button type="submit" class="btn-submit" style="animation-delay:0.76s">
            <i class="fas fa-user-graduate"></i> Crear cuenta
        </button>

        <div class="form-footer">
            <p>Ya tienes cuenta? <a th:href="@{/login}">Inicia sesion aqui</a></p>
        </div>

        <a th:href="@{/}" class="back-link">
            <i class="fas fa-arrow-left me-1"></i> Volver al inicio
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePass(btn) {
        var input = document.getElementById('passwordField');
        var icon = btn.querySelector('i');
        if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
        else { input.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
    }
</script>
</body>
</html>
