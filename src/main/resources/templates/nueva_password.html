<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Contrasena | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #059669; --primary-dark: #047857; --accent: #d97706;
            --text: #1f2937; --text-muted: #6b7280; --white: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; position:relative; overflow-x:hidden; background:#0a0f0d; }

        .bg-animated { position:fixed; inset:0; z-index:0; background:linear-gradient(160deg,#0f172a 0%,#1a1a2e 30%,#064e3b 70%,#047857 100%); }
        .bg-animated::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 25% 25%,rgba(5,150,105,0.12) 0%,transparent 50%),radial-gradient(circle at 75% 75%,rgba(217,119,6,0.08) 0%,transparent 50%); animation:bgPulse 10s ease-in-out infinite; }
        @keyframes bgPulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }

        .orb { position:fixed; border-radius:50%; filter:blur(70px); z-index:0; animation:orbFloat 22s infinite ease-in-out; pointer-events:none; }
        .orb-1 { width:320px;height:320px;background:rgba(5,150,105,0.18); top:-100px;right:-80px; }
        .orb-2 { width:280px;height:280px;background:rgba(217,119,6,0.12); bottom:-90px;left:-70px;animation-delay:-10s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 25%{transform:translate(-30px,35px) scale(1.1);} 50%{transform:translate(20px,-30px) scale(0.9);} 75%{transform:translate(-40px,-20px) scale(1.05);} }

        .grid-overlay { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px); background-size:50px 50px; pointer-events:none; }

        .password-card { background:rgba(255,255,255,0.93); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:24px; padding:2.3rem 2rem; width:100%; max-width:440px; border:1px solid rgba(255,255,255,0.35); box-shadow:0 30px 60px rgba(0,0,0,0.25); position:relative; z-index:1; text-align:center; animation:cardIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
        @keyframes cardIn { from{opacity:0;transform:translateY(40px) scale(0.94);} to{opacity:1;transform:translateY(0) scale(1);} }

        .shield-icon { width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#059669,#047857);display:inline-flex;align-items:center;justify-content:center;margin-bottom:0.8rem;box-shadow:0 10px 28px rgba(5,150,105,0.3); }
        .shield-icon i { font-size:1.6rem;color:white; }

        .password-card h3 { font-size:1.35rem;font-weight:700;color:var(--text);margin-bottom:0.15rem; }
        .password-card .subtitle { color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;display:block; }

        .field-group { text-align:left;margin-bottom:1rem; }
        .field-label { display:block;font-size:0.77rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.35rem; }

        .input-wrapper { position:relative; }
        .input-wrapper .input-icon { position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:0.85rem;transition:color 0.3s;z-index:2;pointer-events:none; }
        .input-modern { width:100%;padding:0.78rem 1rem 0.78rem 2.5rem;border:2px solid #e5e7eb;border-radius:12px;background:#f9fafb;font-size:0.87rem;font-family:'Poppins',sans-serif;color:var(--text);transition:all 0.3s;outline:none; }
        .input-modern:focus { border-color:var(--primary);background:var(--white);box-shadow:0 0 0 5px rgba(5,150,105,0.07); }
        .input-wrapper:focus-within .input-icon { color:var(--primary); }
        .input-modern::placeholder { color:#c4c4c4; }

        .password-toggle { position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;cursor:pointer;padding:0.3rem;transition:color 0.3s;z-index:2; }
        .password-toggle:hover { color:var(--primary); }

        .btn-submit { width:100%;padding:0.85rem;border-radius:50px;border:none;background:linear-gradient(135deg,#059669,#047857);color:white;font-weight:600;font-size:0.9rem;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.3s;margin-top:0.8rem;letter-spacing:0.3px; }
        .btn-submit:hover { transform:translateY(-2px);box-shadow:0 10px 30px rgba(5,150,105,0.35); }
        .btn-submit:active { transform:scale(0.96); }
        .btn-submit::after { content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.12),transparent);transform:translateX(-100%);transition:transform 0.65s; }
        .btn-submit:hover::after { transform:translateX(100%); }

        @media (max-width:576px) {
            .password-card { padding:1.6rem 1.2rem;border-radius:18px; }
        }
    </style>
</head>
<body>

    <div class="bg-animated"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-overlay"></div>

    <div class="password-card">

        <img th:src="@{/img/logo.png}" alt="PortalEdu" style="width:52px;height:52px;border-radius:13px;display:block;margin:0 auto 0.6rem;box-shadow:0 8px 22px rgba(5,150,105,0.25);">

        <div class="shield-icon">
            <i class="fas fa-shield-alt"></i>
        </div>

        <h3>Crea tu nueva clave</h3>
        <span class="subtitle">Ingresa una contrasena segura para acceder a Compuedu</span>

        <form th:action="@{/auth/actualizar-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <div class="field-group">
                <label class="field-label">Nueva Contrasena</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" class="input-modern" id="passField"
                           placeholder="••••••••" required minlength="6">
                    <button type="button" class="password-toggle" onclick="togglePass('passField',this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Confirmar Contrasena</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-double input-icon"></i>
                    <input type="password" class="input-modern" id="confirmField"
                           placeholder="••••••••" required minlength="6">
                    <button type="button" class="password-toggle" onclick="togglePass('confirmField',this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-save me-2"></i> Actualizar Contrasena
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePass(fieldId, btn) {
            var input = document.getElementById(fieldId);
            var icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
