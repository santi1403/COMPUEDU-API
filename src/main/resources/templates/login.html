<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar Sesion | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --accent: #d97706;
            --text: #1f2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            background: #0a0f0d;
        }

        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(160deg, #0f172a 0%, #1a1a2e 30%, #064e3b 70%, #047857 100%);
        }

        .bg-animated::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 25% 25%, rgba(5,150,105,0.15) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(217,119,6,0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(6,182,212,0.06) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
            animation: orbFloat 24s infinite ease-in-out;
            pointer-events: none;
        }

        .orb-1 { width:380px; height:380px; background:rgba(5,150,105,0.22); top:-130px; right:-100px; }
        .orb-2 { width:320px; height:320px; background:rgba(217,119,6,0.18); bottom:-120px; left:-90px; animation-delay:-10s; }
        .orb-3 { width:240px; height:240px; background:rgba(5,150,105,0.14); top:50%; left:60%; animation-delay:-18s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0,0) scale(1); }
            25% { transform: translate(-35px,40px) scale(1.1); }
            50% { transform: translate(25px,-35px) scale(0.9); }
            75% { transform: translate(-45px,-25px) scale(1.08); }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .login-card {
            background: rgba(255,255,255,0.93);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 26px;
            padding: 2.5rem 2.2rem;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow:
                0 30px 70px rgba(0,0,0,0.22),
                0 0 0 1px rgba(255,255,255,0.06) inset;
            position: relative;
            z-index: 1;
            animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        @keyframes cardIn {
            from { opacity:0; transform:translateY(50px) scale(0.94); }
            to { opacity:1; transform:translateY(0) scale(1); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 0.3rem;
        }

        .logo-container img {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(5,150,105,0.25);
            animation: logoBounce 0.6s cubic-bezier(0.16,1,0.3,1) 0.18s both;
        }

        @keyframes logoBounce {
            0% { transform:scale(0) rotate(-8deg); }
            55% { transform:scale(1.12) rotate(2deg); }
            100% { transform:scale(1) rotate(0deg); }
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.2rem;
            color: var(--text);
            animation: fadeUp 0.5s ease 0.28s both;
        }

        .gradient-text {
            background: linear-gradient(135deg, #059669, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-subtitle {
            display: block;
            text-align: center;
            color: #9ca3af;
            font-size: 0.88rem;
            margin-bottom: 1.8rem;
            animation: fadeUp 0.5s ease 0.38s both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(18px); }
            to { opacity:1; transform:translateY(0); }
        }

        .alert-modern {
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.3rem;
            animation: shake 0.5s ease;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        .alert-ok {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-7px); }
            35% { transform: translateX(7px); }
            55% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .input-group-modern {
            position: relative;
            margin-bottom: 1rem;
            animation: fadeUp 0.5s ease both;
        }

        .input-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
            transition: color 0.3s ease;
        }

        .input-group-modern:focus-within .input-label {
            color: var(--primary);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 58%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            z-index: 2;
            pointer-events: none;
        }

        .input-modern {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            background: #f9fafb;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            color: #1f2937;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            outline: none;
        }

        .input-modern:hover {
            border-color: #d1d5db;
            background: #fff;
        }

        .input-modern:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 5px rgba(5,150,105,0.07);
        }

        .input-group-modern:focus-within .input-icon {
            color: var(--primary);
        }

        .input-modern::placeholder {
            color: #c4c4c4;
            font-weight: 400;
        }

        .password-toggle {
            position: absolute;
            right: 0.85rem;
            top: 58%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0.3rem;
            transition: color 0.3s ease;
            z-index: 2;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.82rem;
            color: #6b7280;
            text-decoration: none;
            margin-top: -0.3rem;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
            animation: fadeUp 0.5s ease 0.6s both;
        }

        .forgot-link:hover {
            color: var(--accent);
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #059669, #047857);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
            margin: 1.2rem 0 1.2rem;
            animation: fadeUp 0.5s ease 0.68s both;
            letter-spacing: 0.3px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 40px rgba(5,150,105,0.4);
        }

        .btn-submit:active {
            transform: scale(0.95);
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.12), transparent);
            transform: translateX(-100%);
            transition: transform 0.65s ease;
        }

        .btn-submit:hover::after {
            transform: translateX(100%);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            animation: fadeUp 0.5s ease 0.76s both;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d1d5db, transparent);
        }

        .divider span {
            font-size: 0.78rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .register-section {
            text-align: center;
            animation: fadeUp 0.5s ease 0.84s both;
        }

        .register-section p {
            color: #9ca3af;
            font-size: 0.88rem;
            margin-bottom: 0.6rem;
        }

        .btn-outline-register {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.65rem 1.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            background: transparent;
            color: #6b7280;
            font-weight: 500;
            font-size: 0.88rem;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-outline-register:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(5,150,105,0.04);
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 1.8rem 1.2rem;
                border-radius: 20px;
            }
            .card-title { font-size: 1.35rem; }
            .input-modern {
                font-size: 0.85rem;
                padding: 0.8rem 1rem 0.8rem 2.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animated"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>

    <div class="login-card">

        <div class="logo-container">
            <img th:src="@{/img/logo.png}" alt="PortalEdu">
        </div>

        <h2 class="card-title">Bienvenido de <span class="gradient-text">nuevo</span></h2>
        <span class="card-subtitle">Ingresa tus credenciales para acceder</span>

        <div th:if="${param.error}" class="alert-modern alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span>Usuario o contrasena incorrectos.</span>
        </div>

        <div th:if="${param.logout}" class="alert-modern alert-ok">
            <i class="fas fa-check-circle"></i>
            <span>Has cerrado sesion correctamente.</span>
        </div>

        <form th:action="@{/login}" method="post">

            <div class="input-group-modern" style="animation-delay:0.42s">
                <label class="input-label">Usuario</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="input-modern" placeholder="Nombre de usuario" required autofocus>
            </div>

            <div class="input-group-modern" style="animation-delay:0.52s">
                <label class="input-label">Contrasena</label>
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" class="input-modern" id="passwordField"
                       placeholder="••••••••" required>
                <button type="button" class="password-toggle" onclick="togglePassword(this)" tabindex="-1">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <a th:href="@{/auth/recuperar}" class="forgot-link">
                <i class="fas fa-question-circle"></i> Olvidaste tu contrasena?
            </a>

            <button type="submit" class="btn-submit">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>

            <div class="divider">
                <span>o</span>
            </div>

            <div class="register-section">
                <p>Eres nuevo estudiante?</p>
                <a th:href="@{/registro/estudiante}" class="btn-outline-register">
                    <i class="fas fa-user-plus"></i> Crear cuenta nueva
                </a>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({ once: true, duration: 700 });

        function togglePassword(btn) {
            var input = document.getElementById('passwordField');
            var icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
