<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Usuario | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #059669; --primary-dark: #047857; --accent: #d97706;
            --danger: #dc2626; --text: #1f2937; --text-muted: #6b7280;
            --bg: #f8fafc; --border: #e5e7eb; --white: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }

        .edit-card { background:var(--white); border:1px solid var(--border); border-radius:22px; padding:2.3rem 2rem; width:100%; max-width:620px; box-shadow:0 20px 50px rgba(0,0,0,0.06); position:relative; }

        .mode-badge { display:inline-flex; align-items:center; gap:0.35rem; padding:0.35rem 0.9rem; border-radius:50px; font-size:0.75rem; font-weight:600; background:rgba(217,119,6,0.08); color:#b45309; border:1px solid rgba(217,119,6,0.15); margin-bottom:1.2rem; }
        .mode-badge i { font-size:0.7rem; }

        .logo-img { width:50px; height:50px; border-radius:12px; display:block; margin:0 auto 0.5rem; box-shadow:0 6px 20px rgba(5,150,105,0.2); }
        .card-title { font-size:1.35rem; font-weight:700; text-align:center; color:var(--text); margin-bottom:0.15rem; }
        .card-subtitle { display:block; text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem; }
        .card-subtitle b { color:var(--primary); }

        .alert-modern { background:#fef2f2; border:1px solid #fecaca; color:#dc2626; border-radius:12px; padding:0.75rem 1rem; font-size:0.83rem; display:flex; align-items:center; gap:0.5rem; margin-bottom:1.2rem; animation:shake 0.5s ease; }
        .alert-modern .btn-close { margin-left:auto; font-size:0.5rem; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 15%{transform:translateX(-6px);} 35%{transform:translateX(6px);} 55%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

        .info-banner { background:#f9fafb; border:1px solid var(--border); border-radius:12px; padding:0.8rem 1rem; font-size:0.78rem; color:var(--text-muted); display:flex; align-items:center; gap:0.5rem; margin-bottom:1.2rem; }
        .info-banner i { color:var(--accent); }

        .field-group { margin-bottom:1rem; }
        .field-label { display:block; font-size:0.77rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.35rem; }

        .input-wrapper { position:relative; }
        .input-wrapper .input-icon { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:#9ca3af; font-size:0.85rem; transition:color 0.3s; z-index:2; pointer-events:none; }
        .input-modern { width:100%; padding:0.75rem 1rem 0.75rem 2.5rem; border:2px solid var(--border); border-radius:12px; background:#f9fafb; font-size:0.87rem; font-family:'Poppins',sans-serif; color:var(--text); transition:all 0.3s; outline:none; }
        .input-modern:hover { border-color:#d1d5db; background:var(--white); }
        .input-modern:focus { border-color:var(--primary); background:var(--white); box-shadow:0 0 0 4px rgba(5,150,105,0.06); }
        .input-wrapper:focus-within .input-icon { color:var(--primary); }
        .input-modern::placeholder { color:#c4c4c4; }

        select.input-modern { appearance:none; -webkit-appearance:none; padding-right:2.5rem; cursor:pointer; background-image:none; }
        .select-arrow { position:absolute; right:0.9rem; top:50%; transform:translateY(-50%); color:#9ca3af; font-size:0.7rem; pointer-events:none; transition:color 0.3s; }
        .input-wrapper:focus-within .select-arrow { color:var(--primary); }

        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; }

        .form-actions { display:flex; gap:0.7rem; margin-top:1.5rem; }
        .btn-cancel { flex:1; padding:0.7rem; border-radius:50px; border:1.5px solid var(--border); background:var(--white); color:var(--text-muted); font-weight:500; font-size:0.85rem; font-family:'Poppins',sans-serif; text-decoration:none; text-align:center; transition:all 0.25s; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:0.3rem; }
        .btn-cancel:hover { color:var(--text); border-color:#d1d5db; background:#f9fafb; }
        .btn-submit { flex:1; padding:0.7rem; border-radius:50px; border:none; background:linear-gradient(135deg,#059669,#047857); color:white; font-weight:600; font-size:0.85rem; font-family:'Poppins',sans-serif; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; justify-content:center; gap:0.3rem; }
        .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(5,150,105,0.3); }
        .btn-submit:active { transform:scale(0.96); }

        @media (max-width:576px) {
            .edit-card { padding:1.5rem 1.2rem; border-radius:16px; }
            .form-row { grid-template-columns:1fr; }
            .form-actions { flex-direction:column; }
        }
    </style>
</head>
<body>

<div class="edit-card">

    <div class="mode-badge">
        <i class="fas fa-pen"></i> Modo Edicion
    </div>

    <img th:src="@{/img/logo.png}" alt="Logo" class="logo-img">

    <h2 class="card-title">Editar Perfil de Usuario</h2>
    <span class="card-subtitle">Modificando cuenta: <b th:text="${usuario.userName}">Username</b></span>

    <div th:if="${error}" class="alert-modern" role="alert">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/usuarios/actualizar}" th:object="${usuario}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="form-row">
            <div class="field-group">
                <label class="field-label">Nombre</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" th:field="*{nombre}" class="input-modern" placeholder="Nombre" required>
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Apellido</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" th:field="*{apellido}" class="input-modern" placeholder="Apellido" required>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="field-group" style="grid-column:1 / -1;">
                <label class="field-label">Correo Electronico</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" th:field="*{email}" class="input-modern" required>
                </div>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Rol en el Sistema</label>
            <div class="input-wrapper">
                <i class="fas fa-user-tag input-icon"></i>
                <select th:field="*{rol}" class="input-modern" required>
                    <option value="USER">Estudiante</option>
                    <option value="INSTITUCION">Institucion</option>
                    <option value="ADMIN">Administrador</option>
                </select>
                <i class="fas fa-chevron-down select-arrow"></i>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Documento de Identidad</label>
            <div class="input-wrapper">
                <i class="fas fa-id-card input-icon"></i>
                <input type="text" th:field="*{documento}" class="input-modern" required>
            </div>
        </div>

        <div class="info-banner">
            <i class="fas fa-info-circle"></i>
            El nombre de usuario y la contrasena no son editables desde este panel por seguridad.
            <input type="hidden" th:field="*{userName}" />
            <input type="hidden" th:field="*{password}" />
        </div>

        <div class="form-actions">
            <a th:href="@{/usuarios}" class="btn-cancel">
                <i class="fas fa-times"></i> Cancelar
            </a>
            <button type="submit" class="btn-submit">
                <i class="fas fa-save"></i> Actualizar
            </button>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
