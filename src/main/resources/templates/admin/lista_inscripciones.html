<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestion de Inscripciones | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --accent: #d97706;
            --danger: #dc2626;
            --text: #1f2937;
            --text-muted: #6b7280;
            --bg: #f8fafc;
            --border: #e5e7eb;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            padding: 0.9rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text) !important;
            letter-spacing: -0.3px;
            text-decoration: none;
        }

        .navbar-brand i { color: var(--primary); font-size: 1.3rem; }

        .brand-accent { color: var(--primary); font-weight: 800; }

        .btn-nav {
            font-weight: 500;
            font-size: 0.82rem;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            transition: all 0.25s ease;
            letter-spacing: 0.2px;
        }

        .btn-nav-back {
            color: var(--text-muted);
            background: transparent;
            border: 1.5px solid var(--border);
        }

        .btn-nav-back:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(5,150,105,0.04);
        }

        .btn-nav-logout {
            color: var(--danger);
            background: transparent;
            border: 1.5px solid var(--border);
        }

        .btn-nav-logout:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            box-shadow: 0 4px 14px rgba(220,38,38,0.2);
        }

        /* ========== CONTENEDOR PRINCIPAL ========== */
        .main-container {
            padding: 2rem 1rem 4rem;
        }

        /* ========== HEADER SECTION ========== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h2 {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.2rem;
            letter-spacing: -0.4px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .pill-count {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.55rem 1.3rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .pill-count strong {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* ========== CARD ========== */
        .card-table {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        /* ========== TABLA ========== */
        .table-modern {
            width: 100%;
            border-collapse: collapse;
        }

        .table-modern thead th {
            background: #f9fafb;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 1rem 1.2rem;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        .table-modern thead th:first-child { padding-left: 1.8rem; }
        .table-modern thead th:last-child { padding-right: 1.8rem; }

        .table-modern tbody td {
            padding: 1.05rem 1.2rem;
            border-bottom: 1px solid #f3f4f6;
            vertical-align: middle;
            color: var(--text);
            font-size: 0.87rem;
        }

        .table-modern tbody td:first-child { padding-left: 1.8rem; }
        .table-modern tbody td:last-child { padding-right: 1.8rem; }

        .table-modern tbody tr {
            transition: background 0.2s ease;
        }

        .table-modern tbody tr:hover {
            background: rgba(5,150,105,0.02);
        }

        .table-modern tbody tr:last-child td {
            border-bottom: none;
        }

        .folio-number {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ========== AVATAR USUARIO ========== */
        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .avatar-green { background: linear-gradient(135deg, #059669, #047857); }
        .avatar-teal { background: linear-gradient(135deg, #0d9488, #0f766e); }
        .avatar-purple { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
        .avatar-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }

        .user-name {
            font-weight: 600;
            color: var(--text);
            display: block;
            font-size: 0.87rem;
        }

        .user-email {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* ========== BADGE CONVOCATORIA ========== */
        .badge-conv {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.8rem;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 500;
            background: rgba(5,150,105,0.06);
            color: #047857;
            border: 1px solid rgba(5,150,105,0.1);
        }

        /* ========== BADGES DE ESTADO ========== */
        .badge-status {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.4rem 0.9rem;
            border-radius: 50px;
            font-size: 0.76rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .badge-pending {
            background: rgba(217,119,6,0.08);
            color: #b45309;
            border: 1px solid rgba(217,119,6,0.15);
        }

        .badge-approved {
            background: rgba(5,150,105,0.08);
            color: #059669;
            border: 1px solid rgba(5,150,105,0.15);
        }

        .badge-rejected {
            background: rgba(220,38,38,0.06);
            color: #dc2626;
            border: 1px solid rgba(220,38,38,0.12);
        }

        /* ========== BOTONES DE ACCION ========== */
        .actions-cell {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-action {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            border: 1.5px solid var(--border);
            background: var(--white);
            text-decoration: none;
        }

        .btn-action-pdf {
            color: #dc2626;
            border-color: #fecaca;
        }

        .btn-action-pdf:hover {
            background: #dc2626;
            color: white;
            border-color: #dc2626;
            box-shadow: 0 6px 16px rgba(220,38,38,0.2);
            transform: translateY(-2px);
        }

        .btn-action-delete {
            color: var(--text-muted);
            border-color: var(--border);
        }

        .btn-action-delete:hover {
            background: #1f2937;
            color: white;
            border-color: #1f2937;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        /* ========== ESTADO VACIO ========== */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state i {
            color: #d1d5db;
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .table-modern thead { display: none; }
            .table-modern tbody td {
                display: block;
                text-align: left !important;
                padding: 0.7rem 1.2rem;
            }
            .table-modern tbody td:first-child { padding-left: 1.2rem; }
            .table-modern tbody td:last-child { padding-right: 1.2rem; }
            .table-modern tbody tr {
                border-bottom: 1px solid var(--border);
                display: block;
                padding: 0.5rem 0;
            }
            .actions-cell { justify-content: flex-start; }
            .page-header h2 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <i class="fas fa-shield-alt me-2"></i>
            Admin<span class="brand-accent">Panel</span>
        </a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/dashboard}" class="btn btn-nav btn-nav-back">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button class="btn btn-nav btn-nav-logout">
                    <i class="fas fa-power-off"></i>
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container main-container">

    <div class="page-header">
        <div>
            <h2>Registro de Inscripciones</h2>
            <p>Historial de estudiantes inscritos en convocatorias.</p>
        </div>
        <div class="pill-count">
            <i class="fas fa-users"></i>
            Total: <strong th:text="${inscripciones.size()}">0</strong>
        </div>
    </div>

    <div class="card-table">

        <div th:if="${inscripciones.empty}" class="empty-state">
            <i class="fas fa-clipboard-list"></i>
            <p>No hay inscripciones registradas aun.</p>
        </div>

        <div class="table-responsive" th:if="${!inscripciones.empty}">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>Folio</th>
                        <th>Estudiante</th>
                        <th>Convocatoria</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ins : ${inscripciones}">
                        <td>
                            <span class="folio-number" th:text="'#' + ${ins.id}">#1</span>
                        </td>

                        <td>
                            <div class="user-cell">
                                <div class="user-avatar avatar-green">
                                    <span th:text="${ins.usuario.userName.substring(0,1)}">U</span>
                                </div>
                                <div>
                                    <span class="user-name" th:text="${ins.usuario.userName}">Usuario</span>
                                    <span class="user-email" th:text="${ins.usuario.email}">email</span>
                                </div>
                            </div>
                        </td>

                        <td>
                            <span class="badge-conv">
                                <i class="fas fa-tag"></i>
                                <span th:text="${ins.convocatoria.titulo}">Nombre Beca</span>
                            </span>
                        </td>

                        <td>
                            <span style="font-size:0.84rem; color: var(--text-muted);">
                                <i class="far fa-calendar-alt me-1" style="color:#9ca3af;"></i>
                                <span th:text="${#temporals.format(ins.fechaInscripcion, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                            </span>
                        </td>

                        <td>
                            <span th:if="${ins.estado == 'PENDIENTE'}" class="badge-status badge-pending">
                                <i class="fas fa-clock"></i> Pendiente
                            </span>
                            <span th:if="${ins.estado == 'ACEPTADA' or ins.estado == 'APROBADA'}" class="badge-status badge-approved">
                                <i class="fas fa-check-circle"></i> Aceptada
                            </span>
                            <span th:if="${ins.estado == 'RECHAZADA'}" class="badge-status badge-rejected">
                                <i class="fas fa-times-circle"></i> Rechazada
                            </span>
                        </td>

                        <td>
                            <div class="actions-cell">
                                <a th:href="@{/convocatorias/comprobante/{id}(id=${ins.id})}"
                                   class="btn-action btn-action-pdf"
                                   title="Descargar Comprobante" data-bs-toggle="tooltip">
                                    <i class="fas fa-file-pdf"></i>
                                </a>

                                <a th:if="${ins.estado == 'RECHAZADA'}"
                                   th:href="@{/admin/inscripciones/eliminar/{id}(id=${ins.id})}"
                                   class="btn-action btn-action-delete"
                                   title="Eliminar registro" data-bs-toggle="tooltip"
                                   onclick="return confirm('Eliminar permanentemente esta inscripcion rechazada?');">
                                    <i class="fas fa-times"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) { return new bootstrap.Tooltip(tooltipTriggerEl) })
</script>

</body>
</html>
