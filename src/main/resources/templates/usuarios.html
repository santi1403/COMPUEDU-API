<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion de Usuarios | PortalEdu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #059669; --primary-dark: #047857; --accent: #d97706;
            --danger: #dc2626; --text: #1f2937; --text-muted: #6b7280;
            --bg: #f8fafc; --border: #e5e7eb; --white: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        .navbar { background:var(--white); border-bottom:1px solid rgba(0,0,0,0.04); padding:0.9rem 0; }
        .navbar-brand { font-weight:700; font-size:1.15rem; color:var(--text)!important; letter-spacing:-0.3px; text-decoration:none; }
        .navbar-brand i { color:var(--primary); font-size:1.3rem; }
        .brand-accent { color:var(--primary); font-weight:800; }

        .btn-nav { font-weight:500; font-size:0.8rem; padding:0.45rem 1.1rem; border-radius:50px; transition:all 0.25s; letter-spacing:0.2px; }
        .btn-nav-back { color:var(--text-muted); background:transparent; border:1.5px solid var(--border); }
        .btn-nav-back:hover { color:var(--primary); border-color:var(--primary); background:rgba(5,150,105,0.04); }
        .btn-nav-logout { color:var(--danger); background:transparent; border:1.5px solid var(--border); }
        .btn-nav-logout:hover { background:var(--danger); color:white; border-color:var(--danger); box-shadow:0 4px 14px rgba(220,38,38,0.2); }

        .main-container { padding:1.8rem 1rem 4rem; }

        .page-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.8rem; flex-wrap:wrap; gap:1rem; }
        .page-header h2 { font-size:1.7rem; font-weight:700; color:var(--text); letter-spacing:-0.4px; margin-bottom:0.2rem; }
        .page-header p { color:var(--text-muted); font-size:0.9rem; margin:0; }

        .btn-pill-primary { display:inline-flex; align-items:center; gap:0.4rem; padding:0.65rem 1.6rem; border-radius:50px; background:linear-gradient(135deg,#059669,#047857); color:white; font-weight:600; font-size:0.85rem; text-decoration:none; transition:all 0.3s; box-shadow:0 4px 15px rgba(5,150,105,0.2); white-space:nowrap; }
        .btn-pill-primary:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(5,150,105,0.35); color:white; }

        .filter-card { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:1.3rem 1.5rem; margin-bottom:1.5rem; box-shadow:0 2px 12px rgba(0,0,0,0.03); }
        .field-label-filter { display:block; font-size:0.74rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.35rem; }

        .input-pill { width:100%; padding:0.6rem 1rem 0.6rem 2.4rem; border:1.5px solid var(--border); border-radius:50px; background:#f9fafb; font-size:0.83rem; font-family:'Poppins',sans-serif; color:var(--text); transition:all 0.25s; outline:none; }
        .input-pill:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(5,150,105,0.06); background:var(--white); }
        .input-pill::placeholder { color:#c4c4c4; }

        select.input-pill { appearance:none; -webkit-appearance:none; padding-right:2.4rem; cursor:pointer; background-image:none; }

        .btn-filter { padding:0.6rem 1.4rem; border-radius:50px; border:none; background:linear-gradient(135deg,#059669,#047857); color:white; font-weight:600; font-size:0.82rem; font-family:'Poppins',sans-serif; cursor:pointer; transition:all 0.3s; }
        .btn-filter:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(5,150,105,0.3); }
        .btn-clear { width:40px; height:40px; border-radius:50%; border:1.5px solid var(--border); background:var(--white); color:var(--text-muted); display:inline-flex; align-items:center; justify-content:center; transition:all 0.25s; }
        .btn-clear:hover { color:var(--primary); border-color:var(--primary); }

        .card-table { background:var(--white); border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.03); }
        .card-table-header { background:var(--white); padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.8rem; }
        .card-table-header h5 { font-weight:700; color:var(--text); margin:0; font-size:0.95rem; }

        .btn-pdf-export { display:inline-flex; align-items:center; gap:0.4rem; padding:0.45rem 1.2rem; border-radius:50px; border:1.5px solid #fecaca; color:#dc2626; font-weight:500; font-size:0.78rem; text-decoration:none; transition:all 0.25s; }
        .btn-pdf-export:hover { background:#dc2626; color:white; border-color:#dc2626; box-shadow:0 4px 14px rgba(220,38,38,0.2); }

        .table-modern { width:100%; border-collapse:collapse; }
        .table-modern thead th { background:#f9fafb; color:var(--text-muted); font-size:0.74rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; padding:0.9rem 1rem; border-bottom:2px solid var(--border); white-space:nowrap; }
        .table-modern thead th:first-child { padding-left:1.5rem; }
        .table-modern thead th:last-child { padding-right:1.5rem; }
        .table-modern tbody td { padding:1rem; border-bottom:1px solid #f3f4f6; vertical-align:middle; font-size:0.85rem; }
        .table-modern tbody td:first-child { padding-left:1.5rem; }
        .table-modern tbody td:last-child { padding-right:1.5rem; }
        .table-modern tbody tr { transition:background 0.2s; }
        .table-modern tbody tr:hover { background:rgba(5,150,105,0.015); }
        .table-modern tbody tr:last-child td { border-bottom:none; }

        .avatar-circle { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.9rem; color:white; flex-shrink:0; text-transform:uppercase; }
        .avatar-green { background:linear-gradient(135deg,#059669,#047857); }
        .avatar-teal { background:linear-gradient(135deg,#0d9488,#0f766e); }
        .avatar-amber { background:linear-gradient(135deg,#d97706,#b45309); }
        .avatar-slate { background:linear-gradient(135deg,#475569,#334155); }

        .badge-rol { display:inline-flex; align-items:center; gap:0.3rem; padding:0.32rem 0.8rem; border-radius:50px; font-size:0.72rem; font-weight:600; }
        .badge-admin { background:rgba(5,150,105,0.08); color:#059669; border:1px solid rgba(5,150,105,0.15); }
        .badge-user { background:rgba(107,114,128,0.08); color:#6b7280; border:1px solid rgba(107,114,128,0.12); }
        .badge-inst { background:rgba(217,119,6,0.08); color:#b45309; border:1px solid rgba(217,119,6,0.15); }

        .badge-estado { display:inline-flex; align-items:center; gap:0.3rem; padding:0.32rem 0.8rem; border-radius:50px; font-size:0.72rem; font-weight:600; }
        .badge-activo { background:rgba(5,150,105,0.07); color:#059669; border:1px solid rgba(5,150,105,0.12); }
        .badge-inactivo { background:rgba(107,114,128,0.07); color:#6b7280; border:1px solid rgba(107,114,128,0.1); }

        .btn-icon { width:34px; height:34px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; font-size:0.82rem; transition:all 0.25s; border:1.5px solid var(--border); background:var(--white); }
        .btn-icon-edit { color:var(--accent); border-color:#fde68a; }
        .btn-icon-edit:hover { background:var(--accent); color:white; border-color:var(--accent); box-shadow:0 4px 12px rgba(217,119,6,0.2); transform:translateY(-2px); }
        .btn-icon-toggle-danger { color:var(--danger); border-color:#fecaca; }
        .btn-icon-toggle-danger:hover { background:var(--danger); color:white; border-color:var(--danger); box-shadow:0 4px 12px rgba(220,38,38,0.2); transform:translateY(-2px); }
        .btn-icon-toggle-success { color:var(--primary); background:#f0fdf4; border-color:#bbf7d0; }
        .btn-icon-toggle-success:hover { background:var(--primary); color:white; border-color:var(--primary); box-shadow:0 4px 12px rgba(5,150,105,0.2); transform:translateY(-2px); }

        .btn-locked { width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; color:#9ca3af; cursor:default; }

        .empty-state { text-align:center; padding:4rem 2rem; }
        .empty-state i { color:#d1d5db; font-size:3rem; margin-bottom:0.8rem; }
        .empty-state p { color:var(--text-muted); font-weight:500; }

        .card-footer-modern { background:#f9fafb; padding:0.8rem 1.5rem; border-top:1px solid var(--border); }
        .card-footer-modern small { color:var(--text-muted); font-size:0.82rem; }
        .card-footer-modern strong { color:var(--primary); font-weight:600; }

        @media (max-width:768px) {
            .table-modern thead { display:none; }
            .table-modern tbody td { display:block; text-align:left!important; padding:0.7rem 1rem; }
            .table-modern tbody td:first-child { padding-left:1rem; }
            .table-modern tbody tr { border-bottom:1px solid var(--border); display:block; padding:0.5rem 0; }
            .page-header h2 { font-size:1.35rem; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <i class="fas fa-cogs me-2"></i>
            Panel<span class="brand-accent">Admin</span>
        </a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/dashboard}" class="btn btn-nav btn-nav-back">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button class="btn btn-nav btn-nav-logout">
                    <i class="fas fa-power-off"></i>
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container main-container">

    <div class="page-header">
        <div>
            <h2>Gestion de Usuarios</h2>
            <p>Administra el acceso y roles de la plataforma.</p>
        </div>
        <a th:href="@{/usuarios/nuevo}" class="btn-pill-primary">
            <i class="fas fa-plus"></i> Nuevo Usuario
        </a>
    </div>

    <div class="filter-card">
        <form method="get" th:action="@{/usuarios}">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="field-label-filter">Buscar Usuario</label>
                    <div style="position:relative;">
                        <i class="fas fa-search" style="position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:0.8rem;pointer-events:none;"></i>
                        <input type="text" name="keyword" id="keyword" class="input-pill"
                               placeholder="Nombre, Email o Documento..." th:value="${keyword}">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="field-label-filter">Filtrar por Rol</label>
                    <div style="position:relative;">
                        <i class="fas fa-tag" style="position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:0.8rem;pointer-events:none;z-index:2;"></i>
                        <select class="input-pill" name="rol" id="rol" style="padding-left:2.4rem;">
                            <option value="Todos" th:selected="${rol == 'Todos'}">Todos los roles</option>
                            <option value="ADMIN" th:selected="${rol == 'ADMIN'}">Administradores</option>
                            <option value="USER" th:selected="${rol == 'USER'}">Usuarios</option>
                            <option value="INSTITUCION" th:selected="${rol == 'INSTITUCION'}">Instituciones</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn-filter">
                        <i class="fas fa-filter me-2"></i> Filtrar
                    </button>
                    <a th:href="@{/usuarios}" class="btn-clear" title="Limpiar Filtros">
                        <i class="fas fa-sync-alt"></i>
                    </a>
                </div>
            </div>
        </form>
    </div>

    <div class="card-table">
        <div class="card-table-header">
            <h5><i class="fas fa-users me-2" style="color:var(--primary);"></i>Lista de Usuarios</h5>
            <a th:href="@{/usuarios/exportarPDF(keyword=${keyword})}" class="btn-pdf-export">
                <i class="fas fa-file-pdf"></i> Exportar PDF
            </a>
        </div>

        <div th:if="${usuarios.empty}" class="empty-state">
            <i class="fas fa-user-slash"></i>
            <p>No se encontraron usuarios.</p>
        </div>

        <div class="table-responsive" th:if="${!usuarios.empty}">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Contacto</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="avatar-circle avatar-green">
                                    <span th:text="${u.userName.substring(0,1)}">U</span>
                                </div>
                                <div>
                                    <div style="font-weight:600;color:var(--text);" th:text="${u.nombre + ' ' + u.apellido}">Nombre Real</div>
                                    <small style="font-size:0.73rem;color:var(--text-muted);">
                                        @<span th:text="${u.userName}">username</span>
                                        <span style="margin:0 0.3rem;">|</span>
                                        ID: #<span th:text="${u.id}">1</span>
                                    </small>
                                </div>
                            </div>
                        </td>

                        <td>
                            <div style="font-size:0.82rem;">
                                <div style="margin-bottom:0.15rem;">
                                    <i class="fas fa-envelope" style="color:#9ca3af;width:18px;"></i>
                                    <span th:text="${u.email != null ? u.email : '-'}">email</span>
                                </div>
                                <div>
                                    <i class="fas fa-id-card" style="color:#9ca3af;width:18px;"></i>
                                    <span th:text="${u.documento != null ? u.documento : '-'}">documento</span>
                                </div>
                            </div>
                        </td>

                        <td>
                            <span class="badge-rol"
                                  th:classappend="${u.rol == 'ADMIN' ? 'badge-admin' : (u.rol == 'INSTITUCION' ? 'badge-inst' : 'badge-user')}"
                                  th:text="${u.rol}">ROL</span>
                        </td>

                        <td>
                            <span th:if="${u.habilitado}" class="badge-estado badge-activo">
                                <i class="fas fa-check-circle"></i> Activo
                            </span>
                            <span th:unless="${u.habilitado}" class="badge-estado badge-inactivo">
                                <i class="fas fa-ban"></i> Inactivo
                            </span>
                        </td>

                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{'/usuarios/editar/' + ${u.id}}"
                                   class="btn-icon btn-icon-edit" title="Editar Usuario" data-bs-toggle="tooltip">
                                    <i class="fas fa-pen"></i>
                                </a>

                                <div th:if="${u.userName == 'manny'}"
                                     class="btn-locked" title="Cuenta Protegida" data-bs-toggle="tooltip">
                                    <i class="fas fa-lock"></i>
                                </div>

                                <form th:if="${u.userName != 'manny'}"
                                      th:action="@{'/usuarios/estado/' + ${u.id}}" method="post" style="display:inline;">
                                    <button type="submit"
                                            class="btn-icon"
                                            th:classappend="${u.habilitado ? 'btn-icon-toggle-danger' : 'btn-icon-toggle-success'}"
                                            th:title="${u.habilitado ? 'Inhabilitar Usuario' : 'Habilitar Usuario'}"
                                            data-bs-toggle="tooltip"
                                            th:onclick="return confirm([[${u.habilitado}]] ? 'Inhabilitar acceso a este usuario?' : 'Habilitar acceso de nuevo?');">
                                        <i th:class="${u.habilitado ? 'fas fa-user-slash' : 'fas fa-user-check'}"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer-modern" th:if="${!usuarios.empty}">
            <small>Total: <strong th:text="${usuarios.size()}">0</strong> usuarios registrados.</small>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>
</body>
</html>
