<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Perfil | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #059669; --primary-dark: #047857; --accent: #d97706;
            --text: #1f2937; --text-muted: #6b7280; --bg: #f8fafc;
            --border: #e5e7eb; --white: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }

        .profile-card { background:var(--white); border:1px solid var(--border); border-radius:22px; padding:2.2rem 2rem; width:100%; max-width:500px; box-shadow:0 20px 50px rgba(0,0,0,0.06); text-align:center; }

        .avatar-circle { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,#059669,#047857); display:inline-flex; align-items:center; justify-content:center; font-size:2.2rem; font-weight:700; color:white; margin-bottom:0.8rem; box-shadow:0 12px 30px rgba(5,150,105,0.3); text-transform:uppercase; }
        .avatar-circle i { font-size:1.8rem; }

        .profile-card h3 { font-size:1.35rem; font-weight:700; color:var(--text); margin-bottom:0.15rem; }
        .profile-card .subtitle { color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem; display:block; }

        .field-group { text-align:left; margin-bottom:1rem; }
        .field-label { display:block; font-size:0.77rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.35rem; }

        .input-wrapper { position:relative; }
        .input-wrapper .input-icon { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:#9ca3af; font-size:0.85rem; transition:color 0.3s; z-index:2; pointer-events:none; }
        .input-modern { width:100%; padding:0.78rem 1rem 0.78rem 2.5rem; border:2px solid var(--border); border-radius:12px; background:#f9fafb; font-size:0.87rem; font-family:'Poppins',sans-serif; color:var(--text); transition:all 0.3s; outline:none; }
        .input-modern:focus { border-color:var(--primary); background:var(--white); box-shadow:0 0 0 4px rgba(5,150,105,0.06); }
        .input-wrapper:focus-within .input-icon { color:var(--primary); }
        .input-modern::placeholder { color:#c4c4c4; }
        .input-modern[readonly] { background:#f3f4f6; color:var(--text-muted); cursor:not-allowed; }

        .field-hint { font-size:0.74rem; color:#9ca3af; margin-top:0.3rem; }

        .form-actions { display:flex; gap:0.7rem; margin-top:1.5rem; }
        .btn-submit { flex:1; padding:0.75rem; border-radius:50px; border:none; background:linear-gradient(135deg,#059669,#047857); color:white; font-weight:600; font-size:0.88rem; font-family:'Poppins',sans-serif; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; justify-content:center; gap:0.4rem; }
        .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(5,150,105,0.3); }
        .btn-cancel { flex:1; padding:0.75rem; border-radius:50px; border:1.5px solid var(--border); background:var(--white); color:var(--text-muted); font-weight:500; font-size:0.88rem; text-decoration:none; transition:all 0.25s; display:inline-flex; align-items:center; justify-content:center; gap:0.3rem; }
        .btn-cancel:hover { color:var(--text); border-color:#d1d5db; background:#f9fafb; }

        @media (max-width:576px) {
            .profile-card { padding:1.5rem 1.2rem; border-radius:16px; }
        }
    </style>
</head>
<body>

<div class="profile-card">

    <div class="avatar-circle">
        <i class="fas fa-user"></i>
    </div>

    <h3>Editar Mis Datos</h3>
    <span class="subtitle">Actualiza tu informacion de contacto</span>

    <form th:action="@{/perfil/actualizar}" th:object="${usuario}" method="post">

        <div class="field-group">
            <label class="field-label">Usuario</label>
            <div class="input-wrapper">
                <i class="fas fa-user input-icon"></i>
                <input type="text" th:field="*{userName}" class="input-modern" readonly>
            </div>
            <div class="field-hint">El nombre de usuario no se puede cambiar.</div>
        </div>

        <div class="field-group">
            <label class="field-label">Correo Electronico</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" th:field="*{email}" class="input-modern" placeholder="tu@correo.com" required>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Telefono</label>
            <div class="input-wrapper">
                <i class="fas fa-phone input-icon"></i>
                <input type="tel" th:field="*{telefono}" class="input-modern" placeholder="1234567890">
            </div>
        </div>

        <div class="form-actions">
            <a th:href="@{/dashboard}" class="btn-cancel">
                <i class="fas fa-times"></i> Cancelar
            </a>
            <button type="submit" class="btn-submit">
                <i class="fas fa-save"></i> Guardar Cambios
            </button>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
