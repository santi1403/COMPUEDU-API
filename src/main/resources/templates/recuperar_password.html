<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restablecer Contrasena | PortalEdu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary:#059669; --primary-dark:#047857; --accent:#d97706; --danger:#dc2626; --text:#1f2937; --text-muted:#6b7280; --border:#e5e7eb; --white:#ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; background:#f8fafc; }

        .recover-card { background:var(--white); border:1px solid var(--border); border-radius:22px; padding:2.3rem 2rem; width:100%; max-width:440px; box-shadow:0 20px 50px rgba(0,0,0,0.06); text-align:center; animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
        @keyframes cardIn { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

        .logo-img { width:52px;height:52px;border-radius:13px;display:block;margin:0 auto 0.5rem;box-shadow:0 8px 22px rgba(5,150,105,0.22); }

        .email-icon-circle { width:64px;height:64px;border-radius:50%;background:rgba(5,150,105,0.07);display:inline-flex;align-items:center;justify-content:center;margin-bottom:0.8rem; }
        .email-icon-circle i { font-size:1.5rem;color:var(--primary); }

        .recover-card h3 { font-size:1.35rem;font-weight:700;color:var(--text);margin-bottom:0.15rem; }
        .recover-card .subtitle { color:var(--text-muted);font-size:0.85rem;margin-bottom:1.4rem;display:block; }

        .alert-modern { border-radius:12px;padding:0.75rem 1rem;font-size:0.83rem;display:flex;align-items:center;gap:0.5rem;margin-bottom:1.2rem;animation:shake 0.5s ease; }
        .alert-success { background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a; }
        .alert-danger { background:#fef2f2;border:1px solid #fecaca;color:#dc2626; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 15%{transform:translateX(-6px);} 35%{transform:translateX(6px);} 55%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

        .field-group { text-align:left;margin-bottom:1.2rem; }
        .field-label { display:block;font-size:0.77rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.35rem; }

        .input-wrapper { position:relative; }
        .input-wrapper .input-icon { position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:0.85rem;transition:color 0.3s;z-index:2;pointer-events:none; }
        .input-modern { width:100%;padding:0.8rem 1rem 0.8rem 2.5rem;border:2px solid var(--border);border-radius:13px;background:#f9fafb;font-size:0.88rem;font-family:'Poppins',sans-serif;color:var(--text);transition:all 0.3s;outline:none; }
        .input-modern:focus { border-color:var(--primary);background:var(--white);box-shadow:0 0 0 5px rgba(5,150,105,0.07); }
        .input-wrapper:focus-within .input-icon { color:var(--primary); }
        .input-modern::placeholder { color:#c4c4c4; }

        .btn-submit { width:100%;padding:0.85rem;border-radius:50px;border:none;background:linear-gradient(135deg,#059669,#047857);color:white;font-weight:600;font-size:0.9rem;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden; }
        .btn-submit:hover { transform:translateY(-2px);box-shadow:0 10px 30px rgba(5,150,105,0.35); }
        .btn-submit:active { transform:scale(0.96); }
        .btn-submit::after { content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.12),transparent);transform:translateX(-100%);transition:transform 0.65s; }
        .btn-submit:hover::after { transform:translateX(100%); }

        .back-link { display:inline-flex;align-items:center;gap:0.3rem;margin-top:1.2rem;color:var(--text-muted);font-size:0.82rem;font-weight:500;text-decoration:none;transition:color 0.25s; }
        .back-link:hover { color:var(--primary); }

        @media (max-width:576px) { .recover-card { padding:1.6rem 1.2rem;border-radius:18px; } }
    </style>
</head>
<body>

<div class="recover-card">

    <img th:src="@{/img/logo.png}" alt="Logo" class="logo-img">

    <div class="email-icon-circle">
        <i class="fas fa-envelope"></i>
    </div>

    <h3>Restablecer acceso</h3>
    <span class="subtitle">Enviaremos un enlace a tu correo institucional</span>

    <div th:if="${mensaje}" class="alert-modern alert-success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert-modern alert-danger" th:text="${error}"></div>

    <form th:action="@{/auth/enviar-solicitud}" method="post">
        <div class="field-group">
            <label class="field-label">Correo Electronico</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" name="email" class="input-modern" placeholder="usuario@sena.edu.co" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-paper-plane me-2"></i> Enviar instrucciones
        </button>

        <div style="text-align:center;">
            <a th:href="@{/login}" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver al inicio de sesion
            </a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
